server:
  port: ${PORT:8080}

spring:
  application:
    name: ai-study-api
  datasource:
    url: jdbc:h2:file:./data/aistudy;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

app:
  file:
    upload-dir: ./uploads

logging:
  level:
    com.aistudy: DEBUG
